<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00d19d",
              "background-light": "#f5f8f8",
              "background-dark": "#0f231e",
              "surface-dark": "#162b25",
              "border-dark": "#243d37",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined { font-size: 24px; }
      /* Hide scrollbar but allow scrolling */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden pb-32">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-20 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-slate-200 dark:border-border-dark">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Kiểm kê Kho</h2>
<button class="flex w-10 items-center justify-end">
<span class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0">Lưu</span>
</button>
</header>
<!-- Form Section -->
<div class="flex flex-col gap-4 px-4 py-6">
<div class="flex flex-col gap-4">
<!-- Select Warehouse -->
<label class="flex flex-col gap-2">
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Chọn kho</span>
<div class="relative group">
<select class="appearance-none w-full rounded-xl text-slate-900 dark:text-white border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark focus:outline-none focus:ring-2 focus:ring-primary/50 h-14 px-4 text-base font-normal">
<option value="main">Kho chính</option>
<option value="sub">Kho phụ</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-slate-400 pointer-events-none">unfold_more</span>
</div>
</label>
<div class="grid grid-cols-1 gap-4">
<!-- Date Picker -->
<label class="flex flex-col gap-2">
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Ngày kiểm kê</span>
<div class="relative flex w-full items-stretch rounded-xl overflow-hidden border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark focus-within:ring-2 focus-within:ring-primary/50">
<input class="w-full border-none bg-transparent h-14 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 text-base" type="text" value="24/05/2024"/>
<div class="flex items-center justify-center px-4 text-slate-400">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</label>
</div>
<!-- Notes -->
<label class="flex flex-col gap-2">
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium px-1">Ghi chú</span>
<textarea class="w-full rounded-xl text-slate-900 dark:text-white border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark focus:outline-none focus:ring-2 focus:ring-primary/50 min-h-[100px] p-4 text-base font-normal placeholder:text-slate-400" placeholder="Nhập ghi chú kiểm kê..."></textarea>
</label>
</div>
</div>
<!-- Inventory List Section -->
<div class="flex items-center justify-between px-4 pt-4 pb-2">
<h3 class="text-slate-900 dark:text-white text-lg font-bold">Danh sách sản phẩm</h3>
<button class="text-primary flex items-center gap-1 text-sm font-semibold">
<span class="material-symbols-outlined text-sm">add_circle</span> Thêm SP
            </button>
</div>
<!-- Audit Table / List -->
<div class="flex flex-col gap-3 px-4 pb-10">
<!-- Row 1: Discrepancy Negative -->
<div class="p-4 rounded-xl bg-white dark:bg-surface-dark border border-slate-100 dark:border-border-dark shadow-sm">
<div class="flex justify-between items-start mb-3">
<div>
<p class="text-slate-900 dark:text-white font-bold text-base">Trà sữa trân châu</p>
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">SKU: TS-001</p>
</div>
<span class="px-2 py-1 rounded-md bg-red-500/10 text-red-500 text-xs font-bold">Lệch -2</span>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="flex flex-col">
<span class="text-[10px] text-slate-400 uppercase">Hệ thống</span>
<span class="text-lg font-semibold text-slate-700 dark:text-slate-200">50</span>
</div>
<div class="flex flex-col col-span-2">
<span class="text-[10px] text-slate-400 uppercase mb-1">Thực tế</span>
<div class="flex items-center bg-slate-50 dark:bg-background-dark/50 rounded-lg border border-slate-200 dark:border-border-dark px-3 h-10">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-slate-900 dark:text-white font-bold" type="number" value="48"/>
<span class="text-slate-400 text-xs">Ly</span>
</div>
</div>
</div>
</div>
<!-- Row 2: No Discrepancy -->
<div class="p-4 rounded-xl bg-white dark:bg-surface-dark border border-slate-100 dark:border-border-dark shadow-sm">
<div class="flex justify-between items-start mb-3">
<div>
<p class="text-slate-900 dark:text-white font-bold text-base">Cà phê đen đá</p>
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">SKU: CF-002</p>
</div>
<span class="px-2 py-1 rounded-md bg-primary/10 text-primary text-xs font-bold">Lệch 0</span>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="flex flex-col">
<span class="text-[10px] text-slate-400 uppercase">Hệ thống</span>
<span class="text-lg font-semibold text-slate-700 dark:text-slate-200">30</span>
</div>
<div class="flex flex-col col-span-2">
<span class="text-[10px] text-slate-400 uppercase mb-1">Thực tế</span>
<div class="flex items-center bg-slate-50 dark:bg-background-dark/50 rounded-lg border border-slate-200 dark:border-border-dark px-3 h-10">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-slate-900 dark:text-white font-bold" type="number" value="30"/>
<span class="text-slate-400 text-xs">Ly</span>
</div>
</div>
</div>
</div>
<!-- Row 3: Discrepancy Positive -->
<div class="p-4 rounded-xl bg-white dark:bg-surface-dark border border-slate-100 dark:border-border-dark shadow-sm">
<div class="flex justify-between items-start mb-3">
<div>
<p class="text-slate-900 dark:text-white font-bold text-base">Bánh mì pate</p>
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">SKU: BM-005</p>
</div>
<span class="px-2 py-1 rounded-md bg-emerald-500/10 text-emerald-400 text-xs font-bold">Lệch +2</span>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="flex flex-col">
<span class="text-[10px] text-slate-400 uppercase">Hệ thống</span>
<span class="text-lg font-semibold text-slate-700 dark:text-slate-200">20</span>
</div>
<div class="flex flex-col col-span-2">
<span class="text-[10px] text-slate-400 uppercase mb-1">Thực tế</span>
<div class="flex items-center bg-slate-50 dark:bg-background-dark/50 rounded-lg border border-slate-200 dark:border-border-dark px-3 h-10">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-slate-900 dark:text-white font-bold" type="number" value="22"/>
<span class="text-slate-400 text-xs">Cái</span>
</div>
</div>
</div>
</div>
</div>
<!-- Fixed Summary and Action Bar -->
<div class="fixed bottom-0 left-0 right-0 z-30 bg-white/90 dark:bg-background-dark/95 backdrop-blur-xl border-t border-slate-200 dark:border-border-dark p-4 pb-8">
<div class="flex justify-between items-center mb-4 px-1">
<div class="flex gap-4">
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold">Tổng SP</span>
<span class="text-base font-bold text-slate-900 dark:text-white">15</span>
</div>
<div class="w-[1px] h-8 bg-slate-200 dark:bg-border-dark"></div>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold">Đúng</span>
<span class="text-base font-bold text-primary">10</span>
</div>
<div class="w-[1px] h-8 bg-slate-200 dark:bg-border-dark"></div>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold">Lệch</span>
<span class="text-base font-bold text-red-400">5</span>
</div>
</div>
<button class="flex items-center justify-center size-10 rounded-full bg-primary/20 text-primary">
<span class="material-symbols-outlined">analytics</span>
</button>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Hoàn thành kiểm kê
            </button>
</div>
</div>
</body></html>
