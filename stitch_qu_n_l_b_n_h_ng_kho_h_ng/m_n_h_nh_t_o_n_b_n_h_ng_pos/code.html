<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "success": "#16a34a",
                        "danger": "#dc2626",
                        "background-light": "#f8fafc",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Màn hình Tạo đơn bán hàng (POS)</title>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Tạo đơn bán hàng</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">barcode_scanner</span>
</button>
</header>
<main class="pb-32">
<!-- Customer Selection -->
<section class="p-4 space-y-3">
<div class="flex gap-2">
<div class="relative flex-1">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">person</span>
<select class="w-full h-11 pl-10 pr-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary appearance-none text-sm font-medium">
<option>Khách lẻ</option>
<option>Nguyễn Văn A</option>
<option>Trần Thị B</option>
</select>
<span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 pointer-events-none">expand_more</span>
</div>
<button class="w-11 h-11 flex items-center justify-center bg-primary text-white rounded-xl shadow-sm shadow-primary/20">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<!-- Product Search -->
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">search</span>
<input class="w-full h-11 pl-10 pr-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-sm" placeholder="Tìm sản phẩm theo tên, SKU..." type="text"/>
</div>
</section>
<!-- Cart List -->
<section class="px-4 space-y-3">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 px-1">Giỏ hàng (2 sản phẩm)</h3>
<!-- Item 1 -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4">
<div class="w-16 h-16 rounded-lg bg-slate-100 dark:bg-slate-800 overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-slate-300 text-3xl">image</span>
</div>
<div class="flex-1 min-w-0">
<h4 class="text-sm font-bold truncate">Gạo ST25 (5kg)</h4>
<p class="text-xs text-slate-500 mb-2">180.000đ / túi</p>
<div class="flex items-center justify-between">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
<button class="w-7 h-7 flex items-center justify-center bg-white dark:bg-slate-700 rounded-md shadow-sm">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<input class="w-10 bg-transparent border-none text-center text-sm font-bold focus:ring-0 p-0" type="number" value="1"/>
<button class="w-7 h-7 flex items-center justify-center bg-white dark:bg-slate-700 rounded-md shadow-sm">
<span class="material-symbols-outlined text-sm text-primary font-bold">add</span>
</button>
</div>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">180.000đ</span>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-4">
<div class="w-16 h-16 rounded-lg bg-slate-100 dark:bg-slate-800 overflow-hidden flex items-center justify-center">
<span class="material-symbols-outlined text-slate-300 text-3xl">image</span>
</div>
<div class="flex-1 min-w-0">
<h4 class="text-sm font-bold truncate">Nước mắm Chinsu 500ml</h4>
<p class="text-xs text-slate-500 mb-2">45.000đ / chai</p>
<div class="flex items-center justify-between">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
<button class="w-7 h-7 flex items-center justify-center bg-white dark:bg-slate-700 rounded-md shadow-sm">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<input class="w-10 bg-transparent border-none text-center text-sm font-bold focus:ring-0 p-0" type="number" value="2"/>
<button class="w-7 h-7 flex items-center justify-center bg-white dark:bg-slate-700 rounded-md shadow-sm">
<span class="material-symbols-outlined text-sm text-primary font-bold">add</span>
</button>
</div>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">90.000đ</span>
</div>
</div>
</div>
</section>
<!-- Order Summary & Payment -->
<section class="p-4 space-y-4">
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-100 dark:border-slate-800 shadow-sm space-y-4">
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500">Tổng tiền hàng</span>
<span class="font-medium">270.000đ</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500">Giảm giá</span>
<div class="flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 pb-1">
<input class="w-20 text-right bg-transparent border-none p-0 focus:ring-0 font-medium text-danger" type="text" value="10.000"/>
<span class="text-slate-400">đ</span>
</div>
</div>
<div class="pt-2 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
<span class="font-bold text-slate-900 dark:text-slate-100">Thành tiền</span>
<span class="text-xl font-black text-primary">260.000đ</span>
</div>
</div>
<!-- Payment Details -->
<div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-100 dark:border-slate-800 shadow-sm space-y-4">
<div class="space-y-2">
<label class="text-xs font-bold uppercase text-slate-500">Khách thanh toán</label>
<div class="flex items-center gap-3">
<div class="flex-1 relative">
<input class="w-full h-11 bg-slate-50 dark:bg-slate-800 border-none rounded-xl text-lg font-bold text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary text-right px-4" type="text" value="200.000"/>
</div>
<div class="flex bg-slate-100 dark:bg-slate-800 rounded-full p-1">
<button class="px-4 py-1.5 rounded-full bg-white dark:bg-slate-700 text-xs font-bold shadow-sm">Tiền mặt</button>
<button class="px-4 py-1.5 rounded-full text-xs font-bold text-slate-500">Chuyển khoản</button>
</div>
</div>
</div>
<div class="flex justify-between items-center">
<span class="flex items-center gap-1.5 bg-danger/10 text-danger px-3 py-1 rounded-full text-xs font-bold">
<span class="material-symbols-outlined text-xs">info</span>
                        Còn nợ
                    </span>
<span class="text-danger font-bold">60.000đ</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4 z-50">
<div class="max-w-md mx-auto">
<button class="w-full h-14 bg-success hover:bg-success/90 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-success/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">check_circle</span>
                Hoàn thành đơn hàng
            </button>
</div>
</footer>
</body></html>
