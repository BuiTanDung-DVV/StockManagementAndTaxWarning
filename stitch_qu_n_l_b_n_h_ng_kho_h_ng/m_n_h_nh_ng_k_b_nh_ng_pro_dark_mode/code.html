<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d19d",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f231e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input:focus {
            box-shadow: 0 0 0 2px rgba(0, 209, 157, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">BánHàng Pro</h2>
</div>
<div class="flex flex-col items-center px-4 pt-8 pb-6">
<div class="w-20 h-20 bg-primary/20 rounded-2xl flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-5xl">shopping_bag</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-light text-[28px] font-bold leading-tight text-center">Tạo tài khoản mới</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal pt-2 text-center">Đăng ký để quản lý cửa hàng hiệu quả</p>
</div>
<div class="flex flex-col gap-4 px-4 py-3">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Họ và tên</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">person</span>
<input class="w-full bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary placeholder:text-slate-400" placeholder="Nhập họ và tên" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Tên đăng nhập</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">account_circle</span>
<input class="w-full bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary placeholder:text-slate-400" placeholder="Tên đăng nhập" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">mail</span>
<input class="w-full bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary placeholder:text-slate-400" placeholder="example@gmail.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Số điện thoại</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">phone_iphone</span>
<input class="w-full bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary placeholder:text-slate-400" placeholder="090 123 4567" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Mật khẩu</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock</span>
<input class="w-full bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-12 pr-12 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary placeholder:text-slate-400" placeholder="Nhập mật khẩu" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-slate-400 cursor-pointer">visibility</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium">Xác nhận mật khẩu</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">lock_reset</span>
<input class="w-full bg-slate-100 dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary placeholder:text-slate-400" placeholder="Nhập lại mật khẩu" type="password"/>
</div>
</div>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded border-slate-300 dark:border-primary/20 bg-transparent text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400 leading-tight" for="terms">
                    Tôi đồng ý với các <span class="text-primary font-medium">Điều khoản dịch vụ</span> và <span class="text-primary font-medium">Chính sách bảo mật</span>.
                </label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4">
                Đăng ký
            </button>
<div class="flex justify-center items-center gap-2 pt-6 pb-12">
<p class="text-slate-500 dark:text-slate-400 text-sm">Đã có tài khoản?</p>
<a class="text-primary font-bold text-sm" href="#">Đăng nhập ngay</a>
</div>
</div>
<div class="mt-auto pb-6 px-4">
<div class="w-full h-[218px] rounded-xl overflow-hidden relative group">
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent z-10"></div>
<img alt="Store management concept" class="w-full h-full object-cover" data-alt="Modern store owner using sales management app" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzXqPZZb8lfQ3dPP6CM62O7d4d-g7KhVOdvxzkJr3OuNlm0HWgEeC1fowuIZva7mSMqoU9l9Zkd-A8NRSnYi0YdzAOeWt33LULYcGkwidGMXgqy797ok-_e0clchcmf5IBt8Dul_kQY9TnRJVEawDEj4-h7CxI4ZoMb7sZBSFCRqZ2TbtuOHSHXSCbFoo1fppuSlhKbxEmRm4D59iqebgLyYVWrL7rfeVa4QVDNf6mnP6efjuZZLdYVmmhbAM-t7p4aGppwiwAQvQ"/>
<div class="absolute bottom-4 left-4 z-20">
<p class="text-white text-sm font-medium">Giải pháp quản lý bán hàng 4.0</p>
</div>
</div>
</div>
</div>
</body></html>
